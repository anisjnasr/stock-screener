# Render Blueprint: Stock Scanner
# Connect this repo in Render Dashboard (New > Blueprint) to create the web service.
# Then add MASSIVE_API_KEY in the service Environment and run DB setup (see docs/DEPLOY.md).

services:
  - type: web
    name: stock-scanner
    runtime: node
    region: oregon
    plan: starter

    buildCommand: npm ci && npm run build
    startCommand: npm run start

    envVars:
      - key: NODE_ENV
        value: production
      - key: MASSIVE_API_KEY
        sync: false
      # Point the app at the persistent disk so the DB survives deploys.
      # The app auto-detects /app/data as a fallback, but this is explicit.
      - key: SCREENER_DB_PATH
        value: /app/data/screener.db
      - key: SCREENER_DATA_DIR
        value: /app/data

    # Persistent disk for screener.db — survives deploys.
    # For Docker (WORKDIR /app): process.cwd()/data = /app/data — matches.
    # For native Node: process.cwd() != /app, so SCREENER_DB_PATH above is needed.
    disk:
      name: screener-data
      mountPath: /app/data
      sizeGB: 10
