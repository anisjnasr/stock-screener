<svg viewBox="0 0 268 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="268" height="100" fill="#171717"/>
  <!-- outer ring -->
  <circle cx="47" cy="50" r="38" fill="none" stroke="#3BBFCF" stroke-width="1.2"/>
  <!-- inner ring -->
  <circle cx="47" cy="50" r="24" fill="none" stroke="#3BBFCF" stroke-width="0.7" opacity=".45"/>
  <!-- crosshair arms -->
  <line x1="47" y1="5"  x2="47" y2="20" stroke="#3BBFCF" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="47" y1="80" x2="47" y2="95" stroke="#3BBFCF" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="2"  y1="50" x2="17" y2="50" stroke="#3BBFCF" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="77" y1="50" x2="92" y2="50" stroke="#3BBFCF" stroke-width="1.2" stroke-linecap="round"/>
  <!-- inner ticks -->
  <line x1="47" y1="22" x2="47" y2="26" stroke="#3BBFCF" stroke-width="0.6" opacity=".4"/>
  <line x1="47" y1="74" x2="47" y2="78" stroke="#3BBFCF" stroke-width="0.6" opacity=".4"/>
  <line x1="19" y1="50" x2="23" y2="50" stroke="#3BBFCF" stroke-width="0.6" opacity=".4"/>
  <line x1="71" y1="50" x2="75" y2="50" stroke="#3BBFCF" stroke-width="0.6" opacity=".4"/>
  <!-- C1 up -->
  <line x1="15" y1="55" x2="15" y2="57" stroke="#3BBFCF" stroke-width="1" stroke-linecap="round"/>
  <rect x="13" y="57" width="5" height="7" fill="#3BBFCF" rx="0.5"/>
  <line x1="15" y1="64" x2="15" y2="66" stroke="#3BBFCF" stroke-width="1" stroke-linecap="round"/>
  <!-- C2 up -->
  <line x1="23" y1="48" x2="23" y2="50" stroke="#3BBFCF" stroke-width="1" stroke-linecap="round"/>
  <rect x="21" y="50" width="5" height="7" fill="#3BBFCF" rx="0.5"/>
  <line x1="23" y1="57" x2="23" y2="59" stroke="#3BBFCF" stroke-width="1" stroke-linecap="round"/>
  <!-- C3 down hollow -->
  <line x1="31" y1="50" x2="31" y2="53" stroke="#3BBFCF" stroke-width="1" stroke-linecap="round"/>
  <rect x="29" y="53" width="5" height="6" fill="none" stroke="#3BBFCF" stroke-width="1" rx="0.5"/>
  <line x1="31" y1="59" x2="31" y2="62" stroke="#3BBFCF" stroke-width="1" stroke-linecap="round"/>
  <!-- C4 down hollow -->
  <line x1="39" y1="53" x2="39" y2="56" stroke="#3BBFCF" stroke-width="1" stroke-linecap="round"/>
  <rect x="37" y="56" width="5" height="6" fill="none" stroke="#3BBFCF" stroke-width="1" rx="0.5"/>
  <line x1="39" y1="62" x2="39" y2="65" stroke="#3BBFCF" stroke-width="1" stroke-linecap="round"/>
  <!-- C5 down hollow crosshair center -->
  <line x1="47" y1="56" x2="47" y2="59" stroke="#3BBFCF" stroke-width="1" stroke-linecap="round"/>
  <rect x="45" y="59" width="5" height="6" fill="none" stroke="#3BBFCF" stroke-width="1" rx="0.5"/>
  <line x1="47" y1="65" x2="47" y2="68" stroke="#3BBFCF" stroke-width="1" stroke-linecap="round"/>
  <!-- C6 strong up -->
  <line x1="55" y1="36" x2="55" y2="38" stroke="#3BBFCF" stroke-width="1" stroke-linecap="round"/>
  <rect x="53" y="38" width="5" height="18" fill="#3BBFCF" rx="0.5"/>
  <line x1="55" y1="56" x2="55" y2="59" stroke="#3BBFCF" stroke-width="1" stroke-linecap="round"/>
  <!-- C7 power bar -->
  <rect x="61" y="25" width="5" height="17" fill="#3BBFCF" rx="0.5"/>
  <line x1="63" y1="42" x2="63" y2="46" stroke="#3BBFCF" stroke-width="1" stroke-linecap="round"/>
  <circle cx="47" cy="50" r="1.5" fill="#3BBFCF" opacity=".35"/>
  <!-- divider -->
  <line x1="102" y1="18" x2="102" y2="82" stroke="#E8E8E8" stroke-width="0.5" opacity=".18"/>
  <!-- wordmark -->
  <text x="116" y="38" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="10" font-weight="400" letter-spacing="6" fill="#E8E8E8" opacity=".42">STOCK</text>
  <text x="113" y="68" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="26" font-weight="500" letter-spacing="0.5" fill="#E8E8E8">STALKER</text>
</svg>
