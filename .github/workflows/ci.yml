# CI: build and lint on push and pull requests
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Opt into Node.js 24 for actions (Node 20 deprecated on runners; default switches June 2026)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Build may reference env; optional for CI
          MASSIVE_API_KEY: ""

      - name: Lint
        run: npm run lint
        continue-on-error: true
